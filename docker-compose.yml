services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-text-embedding-3-small}
      FAISS_INDEX_PATH: /app/data/faiss_index
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.65}
      PLN_TIMEOUT_SECONDS: ${PLN_TIMEOUT_SECONDS:-10.0}
      DATABASE_URL: postgresql+asyncpg://medico:senha@db:5432/assistente
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medico
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: assistente
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medico -d assistente"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app_data:
  pg_data:
